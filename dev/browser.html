<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>MixGame Browser Preview</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #2f2f2f;
        display: grid;
        place-items: center;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .phone {
        width: min(390px, 100vw);
        height: min(844px, 100vh);
        background: #f4f2ed;
        border-radius: 30px;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
        overflow: hidden;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="phone">
      <canvas id="game" width="390" height="844"></canvas>
    </div>
    <script type="module" src="./browser-main.js"></script>
  </body>
</html>
